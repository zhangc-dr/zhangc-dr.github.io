<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学习收藏</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .section-title {
            font-size: 1.5em;
            color: #212529;
            margin-bottom: 15px;
        }
        .post {
            padding: 15px;
            margin-bottom: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        .post:last-child {
            border-bottom: none;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
        }
        .post-title {
            color: #007bff;
            text-decoration: none;
        }
        .post-title:hover {
            text-decoration: underline;
        }
        .post-content, .post-date {
            color: #495057;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>我的学习收藏</h1>
    </header>
    <div class="container">
        <!-- 博客收藏 -->
        <div>
            <h2 class="section-title">博客收藏</h2>
            <div class="post">
                <div class="post-header">
                    <a class="post-title" href="https://zhuanlan.zhihu.com/p/21800662" target="_blank">5G关键技术之波束成型</a>
                    <span class="post-date">收藏日期: 2024-12-23</span>
                </div>
                <p class="post-content">用通俗的语言解释了波束成形的好处。</p>
            </div>
        </div>
        <!-- 视频收藏 -->
        <div>
            <h2 class="section-title">视频收藏</h2>
            <div class="post">
                <div class="post-header">
                    <a class="post-title" href="https://www.youtube.com/watch?v=OAKAZhFmYoI&ab_channel=Hung-yiLee" target="_blank">Machine Learning: Hung-yi Lee's Lecture</a>
                    <span class="post-date">收藏日期: 2025-04-22</span>
                </div>
                <p class="post-content">由Hung-yi Lee讲解的机器学习课程视频。</p>
            </div>
        </div>
    </div>
</body>
</html>
