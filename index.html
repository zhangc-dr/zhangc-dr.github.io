<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的学习日志</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>👨‍💻 我的学习日志</h1>
      <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="log.html">学习日志</a>
        <a href="about.html">关于我</a>
      </nav>
    </div>
  </header>

  <main class="main container">
    <section class="intro">
      <h2>📌 最近更新</h2>
      <ul class="updates" id="updates">
        <!-- 最近更新内容将由 JavaScript 动态加载 -->
      </ul>
    </section>
  </main>

  <footer class="footer">
    <p>© 2025 by zc | GitHub Pages</p>
  </footer>

  <script>
    fetch('logs.json')
      .then(response => response.json())
      .then(data => {
        const updatesList = document.getElementById('updates');
        
        // 获取最后五条日志
        const recentLogs = data.logs.slice(-5);
  
        // 遍历日志并生成列表项
        recentLogs.forEach(log => {
          const listItem = document.createElement('li');
          listItem.textContent = `[${log.date}] ${log.title}`; // 直接是纯文字，不用 a 标签了
          updatesList.appendChild(listItem);
        });
      })
      .catch(error => {
        console.error('获取日志数据失败：', error);
      });
  </script>
  
</body>
</html>
