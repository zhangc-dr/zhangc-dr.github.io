<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的学习收藏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>我的学习收藏</h1>
  </header>
  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('blogs')">博客</div>
      <div class="tab" onclick="switchTab('videos')">视频</div>
    </div>

    <div id="blogs" class="section active">
      <h2 class="section-title">博客收藏</h2>
      <div class="post">
        <div class="post-header">
          <a class="post-title" href="https://zhuanlan.zhihu.com/p/21800662" target="_blank">5G关键技术之波束成型</a>
          <span class="post-date">收藏日期: 2024-12-23</span>
        </div>
        <p class="post-content">用通俗的语言解释了波束成形的好处。</p>
      </div>
    </div>

    <div id="videos" class="section">
      <h2 class="section-title">视频收藏</h2>
      <div class="post">
        <div class="post-header">
          <a class="post-title" href="https://www.youtube.com/watch?v=OAKAZhFmYoI&ab_channel=Hung-yiLee" target="_blank">
            Machine Learning: Hung-yi Lee's Lecture
          </a>
          <span class="post-date">收藏日期: 2025-04-22</span>
        </div>
        <p class="post-content">由Hung-yi Lee讲解的机器学习课程视频。</p>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));

      document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }
  </script>
</body>
</html>
